<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITALISPHERE Favicon Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .icon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .icon-wrapper {
            border: 1px solid #ccc;
            padding: 10px;
            background: #f5f5f5;
            margin-bottom: 10px;
        }
        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="icon-container">
        <div class="title">favicon-16x16.png</div>
        <div class="icon-wrapper" style="width: 16px; height: 16px;">
            <img src="favicon-16.svg" width="16" height="16" alt="Favicon 16x16">
        </div>
    </div>

    <div class="icon-container">
        <div class="title">favicon-32x32.png</div>
        <div class="icon-wrapper" style="width: 32px; height: 32px;">
            <img src="favicon-32.svg" width="32" height="32" alt="Favicon 32x32">
        </div>
    </div>

    <div class="icon-container">
        <div class="title">apple-touch-icon.png (180x180)</div>
        <div class="icon-wrapper" style="width: 180px; height: 180px;">
            <img src="apple-touch-icon.svg" width="180" height="180" alt="Apple Touch Icon">
        </div>
    </div>

    <div class="icon-container">
        <div class="title">favicon-192x192.png</div>
        <div class="icon-wrapper" style="width: 192px; height: 192px;">
            <img src="favicon-192.svg" width="192" height="192" alt="Favicon 192x192">
        </div>
    </div>

    <div class="icon-container">
        <div class="title">favicon-512x512.png</div>
        <div class="icon-wrapper" style="width: 512px; height: 512px;">
            <img src="favicon-512.svg" width="512" height="512" alt="Favicon 512x512">
        </div>
    </div>

    <script>
        // Если нужен скрипт для экспорта в PNG, добавим сюда
    </script>
</body>
</html>
