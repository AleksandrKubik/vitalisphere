server {
    listen 80;
    server_name edfuncontent.com www.edfuncontent.com;
    root /var/www/portal/frontend;
    index index.html;

    # Логи
    access_log /var/log/nginx/portal-access.log;
    error_log /var/log/nginx/portal-error.log;

    # Кэширование статических файлов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Основной маршрут для SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Перенаправление API запросов на бэкенд
    location /api {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
    }
} 